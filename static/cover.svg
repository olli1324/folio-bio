<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="'IBM Plex Sans', system-ui, sans-serif">
  <defs>
    <linearGradient id="inkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1130"/>
      <stop offset="100%" stop-color="#1A2A8F"/>
    </linearGradient>
    <linearGradient id="paperFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FAFAF6" stop-opacity="0"/>
      <stop offset="60%" stop-color="#FAFAF6" stop-opacity="1"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="deepShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="14" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Paper background -->
  <rect width="1920" height="1080" fill="#FAFAF6"/>

  <!-- Subtle grid texture -->
  <g opacity="0.04" stroke="#0E1130" stroke-width="1">
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
  </g>

  <!-- LEFT: scattered source papers (the "100 papers") -->
  <g transform="translate(80, 200)">
    <!-- Paper 7 (back) -->
    <g transform="translate(20, 280) rotate(-14)" filter="url(#softShadow)">
      <rect width="200" height="260" fill="#FFFFFF" stroke="#E5E2D8"/>
      <rect x="16" y="20" width="140" height="6" fill="#C8C4B6"/>
      <rect x="16" y="36" width="100" height="6" fill="#C8C4B6"/>
      <g fill="#E5E2D8">
        <rect x="16" y="64" width="168" height="4"/><rect x="16" y="76" width="168" height="4"/>
        <rect x="16" y="88" width="140" height="4"/><rect x="16" y="100" width="168" height="4"/>
        <rect x="16" y="112" width="120" height="4"/>
      </g>
    </g>
    <!-- Paper 6 -->
    <g transform="translate(220, 60) rotate(7)" filter="url(#softShadow)">
      <rect width="200" height="260" fill="#FFFFFF" stroke="#E5E2D8"/>
      <rect x="16" y="20" width="120" height="6" fill="#C8C4B6"/>
      <g fill="#E5E2D8">
        <rect x="16" y="48" width="168" height="4"/><rect x="16" y="60" width="168" height="4"/>
        <rect x="16" y="72" width="140" height="4"/><rect x="16" y="84" width="168" height="4"/>
      </g>
    </g>
    <!-- Paper 5 -->
    <g transform="translate(80, 110) rotate(-6)" filter="url(#softShadow)">
      <rect width="200" height="260" fill="#FFFFFF" stroke="#E5E2D8"/>
      <rect x="16" y="20" width="150" height="6" fill="#2742B3"/>
      <rect x="16" y="36" width="90" height="6" fill="#C8C4B6"/>
      <g fill="#E5E2D8">
        <rect x="16" y="64" width="168" height="4"/><rect x="16" y="76" width="168" height="4"/>
        <rect x="16" y="88" width="140" height="4"/><rect x="16" y="100" width="168" height="4"/>
        <rect x="16" y="112" width="120" height="4"/><rect x="16" y="124" width="168" height="4"/>
      </g>
    </g>
    <!-- Paper 4 -->
    <g transform="translate(310, 220) rotate(11)" filter="url(#softShadow)">
      <rect width="200" height="260" fill="#FFFFFF" stroke="#E5E2D8"/>
      <rect x="16" y="20" width="130" height="6" fill="#C8C4B6"/>
      <g fill="#E5E2D8">
        <rect x="16" y="48" width="168" height="4"/><rect x="16" y="60" width="140" height="4"/>
        <rect x="16" y="72" width="168" height="4"/><rect x="16" y="84" width="120" height="4"/>
      </g>
    </g>
    <!-- Paper 3 -->
    <g transform="translate(140, 380) rotate(4)" filter="url(#softShadow)">
      <rect width="200" height="260" fill="#FFFFFF" stroke="#E5E2D8"/>
      <rect x="16" y="20" width="160" height="6" fill="#2BC4A2"/>
      <rect x="16" y="36" width="110" height="6" fill="#C8C4B6"/>
      <g fill="#E5E2D8">
        <rect x="16" y="64" width="168" height="4"/><rect x="16" y="76" width="140" height="4"/>
        <rect x="16" y="88" width="168" height="4"/>
      </g>
    </g>
  </g>

  <!-- Fade overlay so left papers recede into the page -->
  <rect x="0" y="0" width="900" height="1080" fill="url(#paperFade)"/>

  <!-- Flow arrow -->
  <g transform="translate(720, 540)">
    <line x1="0" y1="0" x2="180" y2="0" stroke="#9A9CAF" stroke-width="2" stroke-dasharray="2 6"/>
    <path d="M 175 -8 L 195 0 L 175 8 Z" fill="#2742B3"/>
  </g>

  <!-- RIGHT: the synthesized briefing -->
  <g transform="translate(960, 130)" filter="url(#deepShadow)">
    <!-- Briefing card -->
    <rect width="820" height="820" rx="8" fill="#FFFFFF" stroke="#E5E2D8"/>

    <!-- Top mono label -->
    <text x="56" y="80" font-family="'IBM Plex Mono', ui-monospace, monospace"
          font-size="13" letter-spacing="2.6" fill="#6E7186" font-weight="500">
      FOLIO · BRIEFING №001
    </text>
    <line x1="56" y1="100" x2="764" y2="100" stroke="#E5E2D8"/>

    <!-- Title -->
    <text x="56" y="180" font-size="44" font-weight="500" fill="#131524" letter-spacing="-0.5">
      From a hundred papers,
    </text>
    <text x="56" y="232" font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-size="48" fill="#1A2A8F">
      one clear briefing.
    </text>

    <!-- Meta row -->
    <g font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="12"
       letter-spacing="1.8" fill="#6E7186" font-weight="500">
      <text x="56" y="300">SOURCES · 142</text>
      <text x="260" y="300">TRIALS · 28</text>
      <text x="440" y="300">READ TIME · 4 MIN</text>
    </g>
    <line x1="56" y1="324" x2="764" y2="324" stroke="#E5E2D8"/>

    <!-- Body lines -->
    <g fill="#E5E2D8">
      <rect x="56" y="360" width="708" height="6" rx="3"/>
      <rect x="56" y="380" width="708" height="6" rx="3"/>
      <rect x="56" y="400" width="540" height="6" rx="3"/>

      <rect x="56" y="448" width="708" height="6" rx="3"/>
      <rect x="56" y="468" width="660" height="6" rx="3"/>
      <rect x="56" y="488" width="708" height="6" rx="3"/>
      <rect x="56" y="508" width="420" height="6" rx="3"/>
    </g>

    <!-- Callout block -->
    <rect x="56" y="556" width="708" height="120" rx="6" fill="#E4E8FA"/>
    <rect x="56" y="556" width="6" height="120" fill="#2742B3"/>
    <text x="84" y="592" font-family="'IBM Plex Mono', ui-monospace, monospace"
          font-size="11" letter-spacing="2" fill="#1A2A8F" font-weight="600">
      KEY FINDING
    </text>
    <g fill="#1A2A8F" opacity="0.35">
      <rect x="84" y="612" width="640" height="6" rx="3"/>
      <rect x="84" y="630" width="580" height="6" rx="3"/>
      <rect x="84" y="648" width="420" height="6" rx="3"/>
    </g>

    <!-- Footer / citation marks -->
    <g transform="translate(56, 720)">
      <circle cx="6" cy="6" r="6" fill="#2BC4A2"/>
      <text x="22" y="11" font-family="'IBM Plex Mono', ui-monospace, monospace"
            font-size="12" letter-spacing="1.4" fill="#1A8C6E" font-weight="500">
        SYNTHESIS COMPLETE
      </text>
      <text x="708" y="11" font-family="'IBM Plex Mono', ui-monospace, monospace"
            font-size="12" letter-spacing="1.4" fill="#6E7186" text-anchor="end">
        [01] [02] [03] … [142]
      </text>
    </g>
  </g>

  <!-- Top-left hackathon mono label -->
  <text x="80" y="100" font-family="'IBM Plex Mono', ui-monospace, monospace"
        font-size="14" letter-spacing="3" fill="#6E7186" font-weight="500">
    AI OLYMPIC HACKATHON · 2026
  </text>

  <!-- Bottom-left wordmark -->
  <g transform="translate(80, 960)">
    <text font-family="'IBM Plex Sans', sans-serif" font-weight="300"
          font-size="64" letter-spacing="14" fill="#0E1130">FOLIO</text>
    <text y="40" font-family="'Instrument Serif', Georgia, serif" font-style="italic"
          font-size="22" fill="#2742B3">
      biomedical literature, synthesized.
    </text>
  </g>
</svg>
